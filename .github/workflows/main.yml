name: 🔨 Build APK

on:
  workflow_dispatch:

jobs:
  build:
    name: 🔨 Build Debug APK
    runs-on: ubuntu-latest

    steps:

      # ── 1. Checkout ──────────────────────────────────────────
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      # ── 2. Generate Gradle wrapper ───────────────────────────
      - name: 🔧 Generate Gradle wrapper
        run: |
          set -euo pipefail
          echo "Downloading Gradle 8.7 distribution..."
          curl -fsSL \
            "https://services.gradle.org/distributions/gradle-8.7-bin.zip" \
            -o /tmp/gradle-dist.zip
          unzip -q /tmp/gradle-dist.zip -d /tmp/gradle-dist
          GRADLE_BIN=$(find /tmp/gradle-dist -name "gradle" -type f | head -1)
          "$GRADLE_BIN" wrapper --gradle-version=8.7 --distribution-type=bin
          chmod +x gradlew
          if [ ! -f "local.properties" ]; then
            echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          fi
          echo "✅ Done."

      # ── 3. Java 17 ───────────────────────────────────────────
      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      # ── 4. Build debug APK ───────────────────────────────────
      - name: 🔨 Build debug APK
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4g -Dfile.encoding=UTF-8" \
            -Dorg.gradle.parallel=true \
            -Dorg.gradle.caching=true

      # ── 5. Rename & upload APK ───────────────────────────────
      - name: 📝 Rename APK
        id: apk
        run: |
          APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          VER=$(grep 'versionName' app/build.gradle.kts \
                | head -1 | grep -o '"[^"]*"' | tr -d '"')
          VER="${VER:-1.0.0}"
          SHA="${GITHUB_SHA::7}"
          OUTNAME="HotspotX-debug-v${VER}-${SHA}.apk"
          mkdir -p out
          cp "$APK" "out/$OUTNAME"
          echo "filename=$OUTNAME"           >> "$GITHUB_OUTPUT"
          echo "size=$(du -sh $APK|cut -f1)" >> "$GITHUB_OUTPUT"
          echo "version=$VER"                >> "$GITHUB_OUTPUT"

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.filename }}
          path: out/*.apk
          retention-days: 30

      # ── 6. Summary ───────────────────────────────────────────
      - name: 📊 Summary
        run: |
          {
            echo "## ✅ Build Complete"
            echo "| | |"
            echo "|---|---|"
            echo "| **APK** | \`${{ steps.apk.outputs.filename }}\` |"
            echo "| **Version** | v${{ steps.apk.outputs.version }} |"
            echo "| **Size** | ${{ steps.apk.outputs.size }} |"
          } >> "$GITHUB_STEP_SUMMARY"
