name: 🔎 PR Check

on:
  pull_request:
    branches: [ main, develop ]
    types: [ opened, synchronize, reopened, ready_for_review ]

# Cancel in-progress runs for the same PR branch
concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pr-check:
    name: 🔎 Compile & Lint
    runs-on: ubuntu-latest
    # Skip draft PRs
    if: github.event.pull_request.draft == false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts','**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: 🧱 Compile Kotlin
        run: ./gradlew compileDebugKotlin --no-daemon --stacktrace

      - name: 🔍 Run Lint
        run: ./gradlew lintDebug --continue --no-daemon

      - name: 📤 Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-lint-${{ github.event.pull_request.number }}
          path: app/build/reports/lint-results-debug.html
          retention-days: 7

      - name: 📊 PR summary
        if: always()
        run: |
          {
            echo "## 🔎 PR Check — #${{ github.event.pull_request.number }}"
            echo "| Step | Status |"
            echo "|---|---|"
            echo "| Kotlin compile | ${{ job.status }} |"
            echo "| Lint | ${{ job.status }} |"
            echo "| Branch | \`${{ github.head_ref }}\` → \`${{ github.base_ref }}\` |"
          } >> $GITHUB_STEP_SUMMARY
