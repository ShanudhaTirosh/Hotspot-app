name: 🔨 Build & Release

# ═══════════════════════════════════════════════════════════
#  TRIGGERS
# ═══════════════════════════════════════════════════════════
on:
  push:
    branches: [ main, develop, 'release/**' ]
    tags:     [ 'v*.*.*' ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      build_variant:
        description: 'Build variant'
        required: true
        default: 'debug'
        type: choice
        options: [ debug, release ]
      run_lint:
        description: 'Run lint?'
        required: false
        default: true
        type: boolean
      upload_artifact:
        description: 'Upload APK artifact?'
        required: false
        default: true
        type: boolean

# ═══════════════════════════════════════════════════════════
#  GLOBAL ENV
# ═══════════════════════════════════════════════════════════
env:
  JAVA_VERSION: '17'
  JAVA_DIST: 'temurin'
  GRADLE_OPTS: >-
    -Dorg.gradle.daemon=false
    -Dorg.gradle.jvmargs=-Xmx4g
    -Dorg.gradle.parallel=true
    -Dorg.gradle.caching=true
  APK_DEBUG:   app/build/outputs/apk/debug
  APK_RELEASE: app/build/outputs/apk/release
  MAPPING:     app/build/outputs/mapping/release/mapping.txt

# ═══════════════════════════════════════════════════════════
#  JOB 1 — Setup & validate
# ═══════════════════════════════════════════════════════════
jobs:
  setup:
    name: 🔧 Setup & Validate
    runs-on: ubuntu-latest
    outputs:
      version_name:   ${{ steps.version.outputs.name }}
      version_code:   ${{ steps.version.outputs.code }}
      short_sha:      ${{ steps.meta.outputs.short_sha }}
      build_date:     ${{ steps.meta.outputs.build_date }}
      is_release_tag: ${{ steps.meta.outputs.is_release_tag }}

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DIST }}
          cache: gradle

      - name: ✅ Validate Gradle wrapper
        uses: gradle/wrapper-validation-action@v3

      - run: chmod +x gradlew

      - name: 📦 Pre-warm dependency cache
        run: ./gradlew dependencies --no-daemon -q

      - name: 🏷️ Read version
        id: version
        run: |
          NAME=$(grep 'versionName' app/build.gradle.kts | head -1 | grep -o '"[^"]*"' | tr -d '"')
          CODE=$(grep 'versionCode' app/build.gradle.kts | head -1 | grep -o '[0-9]*')
          echo "name=${NAME:-1.0.0}" >> $GITHUB_OUTPUT
          echo "code=${CODE:-1}"     >> $GITHUB_OUTPUT

      - name: 📋 Build metadata
        id: meta
        run: |
          echo "short_sha=${GITHUB_SHA::7}"                                       >> $GITHUB_OUTPUT
          echo "build_date=$(date -u +'%Y-%m-%d %H:%M UTC')"                     >> $GITHUB_OUTPUT
          echo "is_release_tag=${{ startsWith(github.ref,'refs/tags/v') }}"      >> $GITHUB_OUTPUT

  # ═══════════════════════════════════════════════════════════
  #  JOB 2 — Lint
  # ═══════════════════════════════════════════════════════════
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    needs: setup
    if: >
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.run_lint == 'true'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DIST }}
          cache: gradle
      - run: chmod +x gradlew

      - name: 🔍 Android Lint
        run: ./gradlew lintDebug --continue --no-daemon

      - name: 📄 Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report-${{ needs.setup.outputs.short_sha }}
          path: app/build/reports/lint-results-debug.html
          retention-days: 14

      - name: 💬 Comment on PR if lint fails
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ **Lint failed.** Download the report from [Actions artifacts](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).'
            })

  # ═══════════════════════════════════════════════════════════
  #  JOB 3 — Build Debug APK
  # ═══════════════════════════════════════════════════════════
  build-debug:
    name: 🐛 Debug APK
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DIST }}
          cache: gradle
      - run: chmod +x gradlew

      - name: 🔨 assembleDebug
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: 📏 APK info
        id: info
        run: |
          APK=$(find ${{ env.APK_DEBUG }} -name "*.apk" | head -1)
          echo "path=$APK"              >> $GITHUB_OUTPUT
          echo "size=$(du -sh $APK | cut -f1)" >> $GITHUB_OUTPUT

      - name: 📝 Rename APK
        run: |
          mkdir -p out
          cp "${{ steps.info.outputs.path }}" \
             "out/HotspotX-debug-v${{ needs.setup.outputs.version_name }}-${{ needs.setup.outputs.short_sha }}.apk"

      - name: 📤 Upload artifact
        if: >
          github.event_name != 'workflow_dispatch' ||
          github.event.inputs.upload_artifact == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: HotspotX-debug-v${{ needs.setup.outputs.version_name }}-${{ needs.setup.outputs.short_sha }}
          path: out/*.apk
          retention-days: 30
          compression-level: 9

      - name: 📊 Summary
        run: |
          {
            echo "## 🐛 Debug APK"
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Version | v${{ needs.setup.outputs.version_name }} (code ${{ needs.setup.outputs.version_code }}) |"
            echo "| Commit | \`${{ needs.setup.outputs.short_sha }}\` |"
            echo "| Size | ${{ steps.info.outputs.size }} |"
            echo "| Built | ${{ needs.setup.outputs.build_date }} |"
          } >> $GITHUB_STEP_SUMMARY

  # ═══════════════════════════════════════════════════════════
  #  JOB 4 — Build Release APK (signed or unsigned)
  # ═══════════════════════════════════════════════════════════
  build-release:
    name: 🚀 Release APK
    runs-on: ubuntu-latest
    needs: [ setup, lint, build-debug ]
    if: >
      (github.ref == 'refs/heads/main'       && github.event_name == 'push') ||
      startsWith(github.ref, 'refs/heads/release/') ||
      startsWith(github.ref, 'refs/tags/v')  ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.build_variant == 'release')

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DIST }}
          cache: gradle
      - run: chmod +x gradlew

      # ── Decode keystore ─────────────────────────────────
      - name: 🔐 Decode keystore
        id: ks
        env:
          KEYSTORE_BASE64:    ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD:  ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > app/keystore.jks
            # Verify integrity
            keytool -list -keystore app/keystore.jks -storepass "$KEYSTORE_PASSWORD" -noprompt \
              && echo "valid=true" >> $GITHUB_OUTPUT \
              || { echo "valid=false" >> $GITHUB_OUTPUT; echo "::warning::Keystore decode failed — building unsigned"; }
          else
            echo "valid=false" >> $GITHUB_OUTPUT
            echo "::warning::KEYSTORE_BASE64 secret is empty — building unsigned release APK"
          fi

      # ── Signed build ─────────────────────────────────────
      - name: 🔒 assembleRelease (signed)
        if: steps.ks.outputs.valid == 'true'
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease --no-daemon --stacktrace \
            -Pandroid.injected.signing.store.file="${GITHUB_WORKSPACE}/app/keystore.jks" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      # ── Unsigned fallback ──────────────────────────────
      - name: 🔓 assembleRelease (unsigned)
        if: steps.ks.outputs.valid != 'true'
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      # ── Shred keystore immediately ─────────────────────
      - name: 🗑️ Shred keystore
        if: always()
        run: shred -u app/keystore.jks 2>/dev/null || rm -f app/keystore.jks

      - name: 📏 APK info
        id: info
        run: |
          APK=$(find ${{ env.APK_RELEASE }} -name "*.apk" | head -1)
          echo "path=$APK" >> $GITHUB_OUTPUT
          echo "size=$(du -sh $APK | cut -f1)" >> $GITHUB_OUTPUT

      - name: 📝 Rename APK
        run: |
          mkdir -p out
          SUFFIX=${{ steps.ks.outputs.valid == 'true' && '"signed"' || '"unsigned"' }}
          cp "${{ steps.info.outputs.path }}" \
             "out/HotspotX-release-v${{ needs.setup.outputs.version_name }}-${{ needs.setup.outputs.short_sha }}-${SUFFIX}.apk"

      - name: 📤 Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: HotspotX-release-v${{ needs.setup.outputs.version_name }}-${{ needs.setup.outputs.short_sha }}
          path: out/*.apk
          retention-days: 90
          compression-level: 9

      - name: 📤 Upload ProGuard mapping
        if: hashFiles(env.MAPPING) != ''
        uses: actions/upload-artifact@v4
        with:
          name: proguard-mapping-v${{ needs.setup.outputs.version_name }}
          path: ${{ env.MAPPING }}
          retention-days: 365

      - name: 📊 Summary
        run: |
          SIGN_STATUS=${{ steps.ks.outputs.valid == 'true' && '"✅ Signed"' || '"⚠️ Unsigned"' }}
          {
            echo "## 🚀 Release APK"
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Version | v${{ needs.setup.outputs.version_name }} (code ${{ needs.setup.outputs.version_code }}) |"
            echo "| Signing | ${SIGN_STATUS} |"
            echo "| Size | ${{ steps.info.outputs.size }} |"
            echo "| Built | ${{ needs.setup.outputs.build_date }} |"
          } >> $GITHUB_STEP_SUMMARY

  # ═══════════════════════════════════════════════════════════
  #  JOB 5 — Create GitHub Release (on version tags only)
  # ═══════════════════════════════════════════════════════════
  github-release:
    name: 📦 GitHub Release
    runs-on: ubuntu-latest
    needs: [ setup, build-release ]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⬇️ Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: HotspotX-release-v${{ needs.setup.outputs.version_name }}-${{ needs.setup.outputs.short_sha }}
          path: apks/

      - name: 📋 Generate changelog
        id: cl
        run: |
          PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV" ]; then
            LOG=$(git log "${PREV}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          else
            LOG=$(git log --pretty=format:"- %s (%h)" --no-merges -30)
          fi
          {
            echo "log<<EOF"
            echo "$LOG"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: 🚀 Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "ShanuFx HotspotX v${{ needs.setup.outputs.version_name }}"
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name,'-beta') || contains(github.ref_name,'-alpha') || contains(github.ref_name,'-rc') }}
          files: apks/*.apk
          body: |
            ## 📱 ShanuFx HotspotX v${{ needs.setup.outputs.version_name }}

            > Wi-Fi Hotspot & USB Tethering Manager for Android — No Root Required

            ### 🆕 Changes
            ${{ steps.cl.outputs.log }}

            ---
            ### 📥 Install
            1. Download the APK below
            2. Android Settings → **Security → Install unknown apps** → allow your Files app
            3. Tap the APK → Install
            4. Grant Location, Phone State & Notification permissions on first launch

            ### 📋 Requirements
            - Android 8.0+ (API 26) · No root needed

            | | |
            |---|---|
            | Version Code | `${{ needs.setup.outputs.version_code }}` |
            | Commit | `${{ needs.setup.outputs.short_sha }}` |
            | Date | ${{ needs.setup.outputs.build_date }} |

            ---
            *Built by [ShanuFx](https://github.com/ShanuFx)*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ═══════════════════════════════════════════════════════════
  #  JOB 6 — Failure notifications (Telegram / Slack)
  # ═══════════════════════════════════════════════════════════
  notify-failure:
    name: 🔔 Notify Failure
    runs-on: ubuntu-latest
    needs: [ build-debug, build-release ]
    if: failure() && github.event_name == 'push'

    steps:
      - name: 📣 Telegram alert
        if: ${{ secrets.TELEGRAM_BOT_TOKEN != '' && secrets.TELEGRAM_CHAT_ID != '' }}
        run: |
          MSG="❌ <b>HotspotX build failed</b>%0A%0ABranch: <code>${{ github.ref_name }}</code>%0ACommit: <code>${{ github.sha }}</code>%0A<a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'>View Run</a>"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=${MSG}" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true"

      - name: 📣 Slack alert
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-type: application/json' \
            --data "{
              \"text\": \"❌ *HotspotX build failed* on \`${{ github.ref_name }}\`\",
              \"attachments\": [{
                \"color\": \"#ff1744\",
                \"fields\": [
                  {\"title\":\"Branch\",  \"value\":\"\`${{ github.ref_name }}\`\", \"short\":true},
                  {\"title\":\"Commit\",  \"value\":\"\`${{ github.sha }}\`\",      \"short\":true},
                  {\"title\":\"Run URL\", \"value\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\", \"short\":false}
                ]
              }]
            }"
