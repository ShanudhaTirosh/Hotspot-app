name: 📦 Zip Extract & Build

# ═══════════════════════════════════════════════════════════
#  TRIGGER — fires when any *.zip lands at the repo root
# ═══════════════════════════════════════════════════════════
on:
  push:
    branches: [ main, develop, 'release/**' ]
    paths:
      - '*.zip'

jobs:
  extract-and-build:
    name: 📂 Extract · Commit · Build
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the commit
      actions:  write   # needed to dispatch build.yml

    steps:
      # ── 1. Checkout ──────────────────────────────────────
      - name: ⬇️ Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Detect zip ────────────────────────────────────
      - name: 🔍 Detect zip at repo root
        id: zip
        run: |
          ZIP=$(find . -maxdepth 1 -name "*.zip" | sort | head -1)
          if [ -z "$ZIP" ]; then
            echo "::notice::No zip file found at repo root — nothing to do."
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "found=true"               >> "$GITHUB_OUTPUT"
            echo "path=$ZIP"                >> "$GITHUB_OUTPUT"
            echo "name=$(basename "$ZIP")"  >> "$GITHUB_OUTPUT"
            echo "::notice::Found zip: $ZIP"
          fi

      # ── 3. Extract (skip .github/workflows) ─────────────
      - name: 📂 Extract zip — skip .github/workflows
        if: steps.zip.outputs.found == 'true'
        run: |
          set -euo pipefail
          ZIP="${{ steps.zip.outputs.path }}"

          # ── Extract into a temp directory ─────────────────
          TMPDIR=$(mktemp -d)
          unzip -o "$ZIP" -d "$TMPDIR"

          # ── Detect whether the zip has a single top-level
          #    folder (e.g. HotspotX/) — if so, use that as
          #    the source root so we don't create a sub-folder
          #    in the repo.
          ITEMS=$(ls "$TMPDIR")
          COUNT=$(echo "$ITEMS" | wc -l)
          if [ "$COUNT" -eq 1 ] && [ -d "$TMPDIR/$ITEMS" ]; then
            SRC="$TMPDIR/$ITEMS"
          else
            SRC="$TMPDIR"
          fi

          echo "Extract source: $SRC"

          # ── Sync to repo root, replacing existing files,
          #    but NEVER touching .github/workflows/
          rsync -av \
            --exclude='.github/' \
            "$SRC/" \
            ./

          # ── Remove the zip itself so it doesn't persist ──
          rm -f "$ZIP"
          echo "✅ Extraction complete."

      # ── 4. Auto-generate missing build artefacts ─────────
      - name: 🔧 Generate missing build files
        if: steps.zip.outputs.found == 'true'
        run: |
          # ── gradlew ───────────────────────────────────────
          if [ ! -f "gradlew" ]; then
            echo "gradlew not found — regenerating via Gradle wrapper task"
            # Use the system gradle to regenerate (falls back to 8.9 if not set in wrapper props)
            GRADLE_VER="8.9"
            if [ -f "gradle/wrapper/gradle-wrapper.properties" ]; then
              GRADLE_VER=$(grep distributionUrl gradle/wrapper/gradle-wrapper.properties \
                           | grep -oP '(?<=gradle-)[0-9.]+(?=-)')
              echo "Detected Gradle version from wrapper props: $GRADLE_VER"
            fi
            curl -sL "https://services.gradle.org/distributions/gradle-${GRADLE_VER}-bin.zip" \
              -o /tmp/gradle.zip
            unzip -q /tmp/gradle.zip -d /tmp/
            GRADLE_BIN=$(find /tmp -name "gradle" -type f | head -1)
            "$GRADLE_BIN" wrapper --gradle-version="$GRADLE_VER"
          fi
          chmod +x gradlew

          # ── gradle-wrapper.jar ────────────────────────────
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "gradle-wrapper.jar missing — downloading"
            mkdir -p gradle/wrapper
            curl -sL \
              "https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar" \
              -o gradle/wrapper/gradle-wrapper.jar
          fi

          # ── local.properties (CI placeholder) ────────────
          if [ ! -f "local.properties" ]; then
            echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties
          fi

          echo "✅ Build file check complete."

      # ── 5. Commit & Push ─────────────────────────────────
      - name: 💾 Commit & push extracted files
        if: steps.zip.outputs.found == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage everything…
          git add -A

          # …but NEVER stage the workflows folder
          git restore --staged .github/workflows/ 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "::notice::Nothing new to commit after extraction."
          else
            git commit -m "📦 Extract ${{ steps.zip.outputs.name }} → update project files [skip ci]"
            git push
            echo "✅ Changes pushed."
          fi

      # ── 6. Trigger build.yml ─────────────────────────────
      - name: 🚀 Trigger Build workflow
        if: steps.zip.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            console.log(`Dispatching build.yml on branch: ${branch}`);
            await github.rest.actions.createWorkflowDispatch({
              owner:       context.repo.owner,
              repo:        context.repo.repo,
              workflow_id: 'build.yml',
              ref:         branch,
              inputs: {
                build_variant:   'debug',
                run_lint:        'true',
                upload_artifact: 'true',
              },
            });
            console.log('✅ build.yml dispatched.');

      # ── 7. Summary ───────────────────────────────────────
      - name: 📊 Job summary
        if: steps.zip.outputs.found == 'true'
        run: |
          {
            echo "## 📦 Zip Extract & Build"
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Zip file | \`${{ steps.zip.outputs.name }}\` |"
            echo "| Branch   | \`${{ github.ref_name }}\` |"
            echo "| Commit   | \`${GITHUB_SHA::7}\` |"
            echo "| Next step | build.yml dispatched ✅ |"
          } >> "$GITHUB_STEP_SUMMARY"
